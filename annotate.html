<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Text Annotation Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a24;
            color: #d4af37;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #toolbar {
            height: 50px;
            background: #0a0a0f;
            border-bottom: 1px solid #d4af37;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }
        
        #toolbar h1 {
            font-size: 16px;
            letter-spacing: 2px;
            margin-right: 20px;
        }
        
        .btn {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 3px;
        }
        
        .btn:hover {
            background: rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
        }
        
        .btn.danger {
            background: rgba(255, 80, 80, 0.1);
            border-color: rgba(255, 80, 80, 0.3);
            color: #ff6b6b;
        }
        
        .btn.danger:hover {
            background: rgba(255, 80, 80, 0.25);
        }
        
        .btn.primary {
            background: rgba(80, 200, 80, 0.1);
            border-color: rgba(80, 200, 80, 0.3);
            color: #50c850;
        }
        
        .btn.primary:hover {
            background: rgba(80, 200, 80, 0.25);
        }
        
        #progress {
            margin-left: auto;
            font-size: 12px;
            color: #888;
        }
        
        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        #sidebar {
            width: 300px;
            background: #0a0a0f;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #sidebar-header {
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size: 12px;
            color: #888;
        }
        
        #regions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .region-item {
            background: #1a1a24;
            border: 1px solid #333;
            padding: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .region-item:hover {
            border-color: #d4af37;
        }
        
        .region-item.selected {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }
        
        .region-item input {
            background: #0a0a0f;
            border: 1px solid #333;
            color: #d4af37;
            padding: 5px;
            font-size: 12px;
            width: 100%;
        }
        
        .region-item .meta {
            font-size: 10px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        
        #canvas-container {
            flex: 1;
            position: relative;
            overflow: auto;
            background: #0a0a0f;
        }
        
        #canvas-wrapper {
            position: relative;
            display: inline-block;
        }
        
        #map-image {
            display: block;
            pointer-events: none;
        }
        
        .region-box {
            position: absolute;
            border: 2px solid #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            cursor: move;
            box-sizing: border-box;
        }
        
        .region-box.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.15);
            border-width: 3px;
        }
        
        .region-box .handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd700;
            border: 1px solid #000;
        }
        
        .region-box .handle.nw { top: -5px; left: -5px; cursor: nw-resize; }
        .region-box .handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
        .region-box .handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }
        .region-box .handle.se { bottom: -5px; right: -5px; cursor: se-resize; }
        
        .region-box .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 20px;
            height: 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            line-height: 18px;
            text-align: center;
            display: none;
        }
        
        .region-box.selected .delete-btn {
            display: block;
        }
        
        #help {
            position: fixed;
            bottom: 20px;
            left: 320px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #333;
            padding: 10px 15px;
            font-size: 11px;
            color: #888;
            border-radius: 4px;
        }
        
        #help kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #d4af37;
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <h1>Text Annotation</h1>
        <button class="btn" id="btn-prev">← Prev</button>
        <button class="btn" id="btn-next">Next →</button>
        <button class="btn danger" id="btn-delete">Delete Selected</button>
        <button class="btn" id="btn-add">Add Region</button>
        <button class="btn primary" id="btn-save">Save</button>
        <button class="btn" id="btn-export-pois">Export POIs</button>
        <span id="progress">0 / 0</span>
    </div>
    
    <div id="main">
        <div id="sidebar">
            <div id="sidebar-header">Click region to select, type name below</div>
            <div id="regions-list"></div>
        </div>
        
        <div id="canvas-container">
            <div id="canvas-wrapper">
                <img id="map-image" src="Parfaron.png" alt="Map">
            </div>
        </div>
    </div>
    
    <div id="help">
        <kbd>Click</kbd> Select | <kbd>Drag</kbd> Move | <kbd>Corner</kbd> Resize | <kbd>Delete</kbd> Remove | <kbd>Esc</kbd> Deselect
    </div>

    <script>
        const MAP_WIDTH = 8192;
        const MAP_HEIGHT = 4096;
        
        let regions = [];
        let selectedIndex = -1;
        let scale = 0.1;
        
        const mapImage = document.getElementById('map-image');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const regionsList = document.getElementById('regions-list');
        const progressEl = document.getElementById('progress');
        
        // Initialize
        mapImage.onload = function() {
            calculateScale();
            loadRegions();
            render();
        };
        
        function calculateScale() {
            const container = document.getElementById('canvas-container');
            scale = Math.min(
                (container.clientWidth - 40) / MAP_WIDTH,
                (container.clientHeight - 40) / MAP_HEIGHT
            );
            canvasWrapper.style.width = MAP_WIDTH * scale + 'px';
            canvasWrapper.style.height = MAP_HEIGHT * scale + 'px';
        }
        
        window.addEventListener('resize', function() {
            calculateScale();
            render();
        });
        
        async function loadRegions() {
            try {
                const response = await fetch('detected_regions.json');
                regions = await response.json();
                // Add name field if not present
                regions.forEach(r => {
                    if (r.name === undefined) r.name = '';
                });
            } catch (e) {
                console.log('No detected regions found, starting fresh');
                regions = [];
            }
            updateProgress();
        }
        
        function updateProgress() {
            progressEl.textContent = `${selectedIndex + 1} / ${regions.length}`;
        }
        
        function render() {
            // Clear existing boxes
            document.querySelectorAll('.region-box').forEach(el => el.remove());
            regionsList.innerHTML = '';
            
            // Render boxes on map
            regions.forEach((r, i) => {
                const box = document.createElement('div');
                box.className = 'region-box' + (i === selectedIndex ? ' selected' : '');
                box.style.left = r.x * scale + 'px';
                box.style.top = r.y * scale + 'px';
                box.style.width = r.w * scale + 'px';
                box.style.height = r.h * scale + 'px';
                box.dataset.index = i;
                
                // Resize handles
                ['nw', 'ne', 'sw', 'se'].forEach(pos => {
                    const handle = document.createElement('div');
                    handle.className = `handle ${pos}`;
                    handle.dataset.handle = pos;
                    box.appendChild(handle);
                });
                
                // Delete button
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = '×';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteRegion(i);
                };
                box.appendChild(delBtn);
                
                box.onclick = (e) => {
                    if (e.target === handle) return;
                    selectRegion(i);
                };
                
                setupDrag(box, i);
                setupResize(box, i);
                
                canvasWrapper.appendChild(box);
            });
            
            // Render sidebar list
            regions.forEach((r, i) => {
                const item = document.createElement('div');
                item.className = 'region-item' + (i === selectedIndex ? ' selected' : '');
                item.onclick = () => selectRegion(i);
                item.innerHTML = `
                    <input type="text" placeholder="Enter name..." value="${r.name || ''}" 
                        onchange="updateName(${i}, this.value)" onclick="event.stopPropagation()">
                    <div class="meta">
                        <span>${r.w}×${r.h}</span>
                        <span>${r.method || 'detected'}</span>
                    </div>
                `;
                regionsList.appendChild(item);
            });
            
            // Scroll selected into view
            if (selectedIndex >= 0) {
                const items = regionsList.querySelectorAll('.region-item');
                if (items[selectedIndex]) {
                    items[selectedIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
            
            updateProgress();
        }
        
        function selectRegion(i) {
            selectedIndex = i;
            render();
        }
        
        function deleteRegion(i) {
            regions.splice(i, 1);
            if (selectedIndex >= regions.length) {
                selectedIndex = regions.length - 1;
            }
            render();
        }
        
        function updateName(i, name) {
            regions[i].name = name;
        }
        
        function setupDrag(box, i) {
            let isDragging = false;
            let startX, startY, startR;
            
            box.onmousedown = function(e) {
                if (e.target.classList.contains('handle') || e.target.classList.contains('delete-btn')) return;
                if (e.target.tagName === 'INPUT') return;
                
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startR = { ...regions[i] };
                e.preventDefault();
            };
            
            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                
                const dx = (e.clientX - startX) / scale;
                const dy = (e.clientY - startY) / scale;
                
                regions[i].x = Math.max(0, Math.min(MAP_WIDTH - regions[i].w, startR.x + dx));
                regions[i].y = Math.max(0, Math.min(MAP_HEIGHT - regions[i].h, startR.y + dy));
                
                box.style.left = regions[i].x * scale + 'px';
                box.style.top = regions[i].y * scale + 'px';
            });
            
            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    render();
                }
            });
        }
        
        function setupResize(box, i) {
            const handles = box.querySelectorAll('.handle');
            
            handles.forEach(handle => {
                let isResizing = false;
                let startX, startY, startR;
                let handlePos = handle.dataset.handle;
                
                handle.onmousedown = function(e) {
                    isResizing = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    startR = { ...regions[i] };
                    e.stopPropagation();
                    e.preventDefault();
                };
                
                document.addEventListener('mousemove', function(e) {
                    if (!isResizing) return;
                    
                    const dx = (e.clientX - startX) / scale;
                    const dy = (e.clientY - startY) / scale;
                    
                    let newR = { ...startR };
                    
                    if (handlePos.includes('e')) {
                        newR.w = Math.max(20, startR.w + dx);
                    }
                    if (handlePos.includes('w')) {
                        newR.x = Math.max(0, startR.x + dx);
                        newR.w = Math.max(20, startR.w - dx);
                    }
                    if (handlePos.includes('s')) {
                        newR.h = Math.max(15, startR.h + dy);
                    }
                    if (handlePos.includes('n')) {
                        newR.y = Math.max(0, startR.y + dy);
                        newR.h = Math.max(15, startR.h - dy);
                    }
                    
                    regions[i] = newR;
                    box.style.left = newR.x * scale + 'px';
                    box.style.top = newR.y * scale + 'px';
                    box.style.width = newR.w * scale + 'px';
                    box.style.height = newR.h * scale + 'px';
                });
                
                document.addEventListener('mouseup', function() {
                    if (isResizing) {
                        isResizing = false;
                        render();
                    }
                });
            });
        }
        
        // Toolbar buttons
        document.getElementById('btn-prev').onclick = function() {
            if (selectedIndex > 0) {
                selectRegion(selectedIndex - 1);
            } else if (regions.length > 0) {
                selectRegion(regions.length - 1);
            }
        };
        
        document.getElementById('btn-next').onclick = function() {
            if (selectedIndex < regions.length - 1) {
                selectRegion(selectedIndex + 1);
            } else if (regions.length > 0) {
                selectRegion(0);
            }
        };
        
        document.getElementById('btn-delete').onclick = function() {
            if (selectedIndex >= 0) {
                deleteRegion(selectedIndex);
            }
        };
        
        document.getElementById('btn-add').onclick = function() {
            const newRegion = {
                x: MAP_WIDTH / 2 - 100,
                y: MAP_HEIGHT / 2 - 20,
                w: 200,
                h: 40,
                name: ''
            };
            regions.push(newRegion);
            selectRegion(regions.length - 1);
        };
        
        document.getElementById('btn-save').onclick = async function() {
            const verified = regions.filter(r => r.name && r.name.length >= 2);
            const blob = new Blob([JSON.stringify(regions, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'verified_regions.json';
            a.click();
            alert(`Saved ${regions.length} regions to verified_regions.json`);
        };
        
        document.getElementById('btn-export-pois').onclick = async function() {
            // Export only regions with names
            const pois = regions
                .filter(r => r.name && r.name.trim().length >= 2)
                .map(r => ({
                    x: Math.round(r.x + r.w / 2),
                    y: Math.round(r.y + r.h / 2),
                    name: r.name.trim()
                }));
            
            if (pois.length === 0) {
                alert('No regions with names to export!');
                return;
            }
            
            const blob = new Blob([JSON.stringify(pois, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pois.json';
            a.click();
            alert(`Exported ${pois.length} POIs to pois.json`);
        };
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (document.activeElement.tagName !== 'INPUT') {
                    deleteRegion(selectedIndex);
                }
            }
            if (e.key === 'Escape') {
                selectedIndex = -1;
                render();
            }
            if (e.key === 'ArrowLeft') {
                if (selectedIndex > 0) selectRegion(selectedIndex - 1);
            }
            if (e.key === 'ArrowRight') {
                if (selectedIndex < regions.length - 1) selectRegion(selectedIndex + 1);
            }
        });
    </script>
</body>
</html>
