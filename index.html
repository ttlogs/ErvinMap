<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parfaron - Layered World Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cinzel', 'Georgia', serif;
            background: #0a0a0f;
            color: #d4af37;
            overflow: hidden;
        }
        
        #viewer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #0a0a0f;
            overflow: hidden;
            cursor: grab;
        }
        
        #map-layers {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
        }
        
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            image-rendering: pixelated;
        }
        
        .layer.interactive {
            pointer-events: auto;
        }
        
        .title-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            pointer-events: none;
        }
        
        .title-bar h1 {
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            pointer-events: auto;
        }
        
        .controls {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }
        
        .controls button {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 8px 14px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        .controls button:hover,
        .controls button.active {
            background: rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
        }
        
        .layer-panel {
            position: fixed;
            top: 60px;
            right: 10px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px;
            z-index: 1000;
            min-width: 180px;
        }
        
        .layer-panel h3 {
            font-size: 12px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .layer-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 12px;
            cursor: pointer;
        }
        
        .layer-toggle input {
            accent-color: #d4af37;
        }
        
        .zoom-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 10px 15px;
            font-size: 12px;
            z-index: 1000;
        }
        
        .coords {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 10px 15px;
            font-size: 12px;
            z-index: 1000;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    </style>
</head>
<body>
    <div class="title-bar">
        <h1>Parfaron</h1>
        <div class="controls">
            <button id="btn-zoom-in">+</button>
            <button id="btn-zoom-out">−</button>
            <button id="btn-reset">Reset</button>
            <button id="btn-fullscreen">⛶</button>
        </div>
    </div>
    
    <div class="layer-panel">
        <h3>Layers</h3>
        <label class="layer-toggle">
            <input type="checkbox" id="layer-terrain" checked>
            <span>🗻 Terrain</span>
        </label>
        <label class="layer-toggle">
            <input type="checkbox" id="layer-labels">
            <span>📛 Labels</span>
        </label>
        <label class="layer-toggle">
            <input type="checkbox" id="layer-roads">
            <span>🛤️ Roads</span>
        </label>
        <label class="layer-toggle">
            <input type="checkbox" id="layer-pois" checked>
            <span>📍 Points</span>
        </label>
    </div>
    
    <div id="viewer">
        <div id="map-layers">
        </div>
    </div>
    
    <div class="zoom-info">
        Zoom: <span id="zoom-level">1.0</span>x
    </div>
    
    <div class="coords">
        <span id="coords">X: 0, Y: 0</span>
    </div>

    <script>
        const MAP_WIDTH = 8192;
        const MAP_HEIGHT = 4096;
        
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        
        const viewer = document.getElementById('viewer');
        const mapLayers = document.getElementById('map-layers');
        
        const layers = [
            { id: 'terrain', name: 'Terrain', src: 'Parfaron.png', zIndex: 1 },
            { id: 'labels', name: 'Labels', src: 'layers/labels.png', zIndex: 2 },
            { id: 'roads', name: 'Roads', src: 'layers/roads.png', zIndex: 3 },
            { id: 'pois', name: 'POIs', src: 'layers/pois.png', zIndex: 4 }
        ];
        
        function init() {
            fitToScreen();
            loadLayers();
            setupEvents();
            loadState();
        }
        
        function fitToScreen() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            scale = Math.min(w / MAP_WIDTH, h / MAP_HEIGHT);
            panX = (w - MAP_WIDTH * scale) / 2;
            panY = (h - MAP_HEIGHT * scale) / 2;
            updateTransform();
        }
        
        function loadLayers() {
            layers.forEach(layer => {
                const img = document.createElement('img');
                img.className = 'layer';
                img.id = layer.id;
                img.src = layer.src;
                img.style.zIndex = layer.zIndex;
                img.onerror = () => { img.style.display = 'none'; };
                mapLayers.appendChild(img);
            });
        }
        
        function setupEvents() {
            viewer.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                viewer.style.cursor = 'grabbing';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                panX += e.clientX - lastMouseX;
                panY += e.clientY - lastMouseY;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                updateTransform();
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
                viewer.style.cursor = 'grab';
            });
            
            viewer.addEventListener('wheel', (e) => {
                e.preventDefault();
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                const rect = viewer.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const wx = (mx - panX) / scale;
                const wy = (my - panY) / scale;
                scale = Math.max(0.1, Math.min(50, scale * factor));
                panX = mx - wx * scale;
                panY = my - wy * scale;
                updateTransform();
            });
            
            document.querySelectorAll('.layer-toggle input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const layer = document.getElementById(e.target.id.replace('layer-', ''));
                    if (layer) layer.style.display = e.target.checked ? 'block' : 'none';
                    localStorage.setItem(e.target.id, e.target.checked);
                });
            });
            
            document.getElementById('btn-zoom-in').onclick = () => { scale *= 1.5; updateTransform(); };
            document.getElementById('btn-zoom-out').onclick = () => { scale /= 1.5; updateTransform(); };
            document.getElementById('btn-reset').onclick = fitToScreen;
            
            document.getElementById('btn-fullscreen').onclick = () => {
                document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
            };
            
            window.addEventListener('resize', fitToScreen);
        }
        
        function updateTransform() {
            mapLayers.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            document.getElementById('zoom-level').textContent = scale.toFixed(2);
            const cx = (window.innerWidth / 2 - panX) / scale;
            const cy = (window.innerHeight / 2 - panY) / scale;
            document.getElementById('coords').textContent = `X: ${Math.round(cx)}, Y: ${Math.round(cy)}`;
        }
        
        function loadState() {
            layers.forEach(l => {
                const saved = localStorage.getItem(`layer-${l.id}`);
                if (saved !== null) {
                    const cb = document.getElementById(`layer-${l.id}`);
                    const visible = saved === 'true';
                    cb.checked = visible;
                    const img = document.getElementById(l.id);
                    if (img) img.style.display = visible ? 'block' : 'none';
                }
            });
        }
        
        init();
    </script>
</body>
</html>
